# Конфиг nginx фронтового образа: SPA + прокси API на backend-сервис compose.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: все не-файловые пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API проксируется на backend; SSE — без буферизации
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
