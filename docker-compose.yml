services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_DB_USER}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD:?set PG_DB_PASSWORD in .env}
      POSTGRES_DB: ${PG_DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DB_USER} -d ${PG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # Миграции применяет отдельный сервис (golang-migrate), а не приложение.
  migrate:
    image: migrate/migrate
    restart: on-failure
    volumes:
      - ./backend/db/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${PG_DB_USER}:${PG_DB_PASSWORD}@db:5432/${PG_DB_NAME}?sslmode=disable",
        "up",
      ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${PG_DB_USER}:${PG_DB_PASSWORD}@db:5432/${PG_DB_NAME}?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        # DEMO_ENABLED=true в .env включает кнопку «Загрузить демо-набор»
        VITE_DEMO_ENABLED: ${DEMO_ENABLED:-false}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:

volumes:
  db_data:
